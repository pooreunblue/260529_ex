<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모 앱</title>

    <!-- Open Graph (OG) Meta Tags -->
    <meta property="og:title" content="나만의 메모 공간" />
    <meta property="og:description" content="언제 어디서나 소중한 아이디어를 기록하세요." />
    <meta property="og:image" content="https://pooreunblue.github.io/260529_ex/img/og_preview.png" />
    <meta property="og:url" content="https://pooreunblue.github.io/260529_ex/" />
    <meta property="og:type" content="website" />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="./favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./apple-touch-icon.png"
    />
    <link rel="manifest" href="./site.webmanifest" />

    <style>
      @font-face {
        font-family: "Suit";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Thin.woff2")
          format("woff2");
        font-weight: 100;
        font-display: swap;
      }
      @font-face {
        font-family: "Suit";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-ExtraLight.woff2")
          format("woff2");
        font-weight: 200;
        font-display: swap;
      }
      @font-face {
        font-family: "Suit";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Light.woff2")
          format("woff2");
        font-weight: 300;
        font-display: swap;
      }
      @font-face {
        font-family: "Suit";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2")
          format("woff2");
        font-weight: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Suit";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Medium.woff2")
          format("woff2");
        font-weight: 500;
        font-display: swap;
      }
      @font-face {
        font-family: "Suit";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-SemiBold.woff2")
          format("woff2");
        font-weight: 600;
        font-display: swap;
      }
      @font-face {
        font-family: "Suit";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Bold.woff2")
          format("woff2");
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: "Suit";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-ExtraBold.woff2")
          format("woff2");
        font-weight: 800;
        font-display: swap;
      }
      @font-face {
        font-family: "Suit";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Heavy.woff2")
          format("woff2");
        font-weight: 900;
        font-display: swap;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Suit", sans-serif;
      }

      #hero-container {
        height: 100vh;
        /* 배경 이미지에 어두운 그라데이션 오버레이 추가하여 가독성 확보 */
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("./img/bg.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .hero-content h1 {
        font-weight: 800;
        letter-spacing: -1px;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
      }

      .hero-content p {
        font-weight: 300;
        text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
      }

      .btn-start {
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        font-weight: 600;
      }
      .btn-start:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3) !important;
      }
    </style>
  </head>
  <body>
    <div
      id="hero-container"
      class="d-flex flex-column justify-content-center align-items-center text-white text-center px-3"
    >
      <div class="hero-content">
        <i class="bi bi-journal-check display-1 mb-3"></i>
        <h1 class="display-3 mb-4">나만의 메모 공간</h1>
        <p class="lead mb-5 fs-4 text-light opacity-75">
          언제 어디서나 소중한 아이디어를 기록하세요.
        </p>
        <button
          id="startBtn"
          class="btn btn-primary btn-lg rounded-pill shadow px-5 py-3 btn-start fs-5"
        >
          메모 하러 가기 <i class="bi bi-arrow-right ms-2"></i>
        </button>
      </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const startBtn = document.querySelector("#startBtn");
        startBtn.addEventListener("click", () => {
          location.href = "memo.html";
        });
      });
    </script>
  </body>
</html>
